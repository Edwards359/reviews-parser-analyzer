services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reviews-worker
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WEBHOOK_PORT:-8100}:8100"
    volumes:
      - ./data:/service/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8100/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
