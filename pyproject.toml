[tool.ruff]
line-length = 110
target-version = "py312"
extend-exclude = [".homework", ".venv", "alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B008", "E501"]

[tool.ruff.lint.per-file-ignores]
"app_test_2803-main/alembic/**" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
